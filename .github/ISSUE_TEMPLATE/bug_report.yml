name: 🐛 Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: os
    attributes:
      label: Operating system
      description: What OS are you using? (e.g. Windows 11, macOS 14, Ubuntu 22.04)
    validations:
      required: true
  - type: input
    id: rust_version
    attributes:
      label: Rust version
      description: Output of `rustc --version`
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      description: Which version of Spotifust are you using?
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      description: Which audio backend are you using?
      options:
        - rodio
        - cpal
        - not sure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please paste any relevant logs here.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
