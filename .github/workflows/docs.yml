name: Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
