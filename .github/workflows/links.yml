name: Broken Links

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --base . --cache --max-cache-age 1d --exclude-loopback --exclude "spotify.*localhost" --verbose '**/*.md'
