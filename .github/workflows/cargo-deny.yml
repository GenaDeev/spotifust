name: Cargo Deny

on:
  push:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'

jobs:
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check licenses, advisories, bans, and sources
        run: cargo deny check
