name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Extract version from Cargo.toml (Unix)
        if: runner.os != 'Windows'
        id: version_unix
        run: |
          APP_VERSION=$(grep '^version' Cargo.toml | head -n 1 | awk -F '"' '{print $2}')
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Extract version from Cargo.toml (Windows)
        if: runner.os == 'Windows'
        id: version_win
        run: |
          $AppVersion = (Select-String -Path "Cargo.toml" -Pattern "^version = `"(.*)`"").Matches.Groups[1].Value
          echo "version=$AppVersion" >> $env:GITHUB_OUTPUT

      - name: Set version output
        id: artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "version=${{ steps.version_win.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ steps.version_unix.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb
          cargo deb --target ${{ matrix.target }}
          
          ARTIFACT="spotifust-${{ matrix.platform }}-${{ steps.artifact.outputs.version }}"
          mkdir -p "staging/${ARTIFACT}"
          cp "target/${{ matrix.target }}/release/spotifust" "staging/${ARTIFACT}/"
          cp "install.sh" "staging/${ARTIFACT}/"
          cp -r "assets" "staging/${ARTIFACT}/"
          
          cd staging
          tar -czvf "../${ARTIFACT}.tar.gz" "${ARTIFACT}"
          cd ..
          
          cp target/${{ matrix.target }}/debian/*.deb "${ARTIFACT}.deb"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
          sha256sum "${ARTIFACT}.deb" > "${ARTIFACT}.deb.sha256"

      - name: Package binary (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_APPLE_ID: ${{ secrets.MACOS_APPLE_ID }}
          MACOS_APP_PASSWORD: ${{ secrets.MACOS_APP_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          ARTIFACT="spotifust-${{ matrix.platform }}-${{ steps.artifact.outputs.version }}"
          APP_VERSION="${{ steps.artifact.outputs.version }}"
          APP_NAME="Spotifust"
          APP_DIR="${APP_NAME}.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"
          cp target/${{ matrix.target }}/release/spotifust "$APP_DIR/MacOS/"
          
          # Minimal Info.plist
          cat <<EOF > "$APP_DIR/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>spotifust</string>
              <key>CFBundleIdentifier</key>
              <string>com.spotifust.app</string>
              <key>CFBundleName</key>
              <string>Spotifust</string>
              <key>CFBundleVersion</key>
              <string>${APP_VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${APP_VERSION}</string>
          </dict>
          </plist>
          EOF
          
          if [ -n "$MACOS_CERT_BASE64" ]; then
              echo "Signing macOS App Bundle..."
              echo "$MACOS_CERT_BASE64" | base64 --decode > cert.p12
              
              KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
              KEYCHAIN_PASSWORD=$(uuidgen)
              security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
              security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
              security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
              
              security import cert.p12 -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
              
              CERT_ID=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID Application" | awk '{print $2}')
              /usr/bin/codesign --force -s "$CERT_ID" --options runtime "$APP_NAME.app"
          fi
          
          # Create DMG
          hdiutil create -volname "${APP_NAME}" -srcfolder "${APP_NAME}.app" -ov -format UDZO "${ARTIFACT}.dmg"
          
          if [ -n "$MACOS_CERT_BASE64" ]; then
              echo "Signing and Notarizing DMG..."
              /usr/bin/codesign --force -s "$CERT_ID" --options runtime "${ARTIFACT}.dmg"
              xcrun notarytool submit "${ARTIFACT}.dmg" --apple-id "$MACOS_APPLE_ID" --password "$MACOS_APP_PASSWORD" --team-id "$MACOS_TEAM_ID" --wait
              xcrun stapler staple "${ARTIFACT}.dmg"
          fi

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        env:
          WIN_CERT_BASE64: ${{ secrets.WIN_CERT_BASE64 }}
          WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
        run: |
          $Artifact = "spotifust-${{ matrix.platform }}-${{ steps.artifact.outputs.version }}"
          $AppVersion = "${{ steps.artifact.outputs.version }}"
          dotnet tool install --global wix
          
          cd installer
          wix extension add WixToolset.UI.wixext
          wix build -d AppVersion=$AppVersion -acceptEula wix7 -ext WixToolset.UI.wixext -o "..\${Artifact}.msi" spotifust.wxs
          cd ..
          
          if ([string]::IsNullOrEmpty($env:WIN_CERT_BASE64) -eq $false) {
              Write-Host "Signing Windows MSI and EXE..."
              $certPath = "cert.pfx"
              [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WIN_CERT_BASE64))
              
              $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Select-Object -First 1).FullName
              
              & $signtool sign /f $certPath /p $env:WIN_CERT_PASSWORD /d "Spotifust" /tr http://timestamp.digicert.com /td sha256 /fd sha256 target\${{ matrix.target }}\release\spotifust.exe
              & $signtool sign /f $certPath /p $env:WIN_CERT_PASSWORD /d "Spotifust Setup" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "${Artifact}.msi"
              Remove-Item $certPath
          }

      - name: Upload packaging artifacts
        uses: actions/upload-artifact@v7
        with:
          name: spotifust-${{ matrix.platform }}
          path: |
            *.tar.gz
            *.dmg
            *.msi
            *.deb
            *.sha256

  publish-release:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine Prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref }}" == *"alpha"* || "${{ github.ref }}" == *"beta"* || "${{ github.ref }}" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: true
