name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 0' # Weekly on Sunday

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ] # C++ analyzer covers Rust via experimental features/workarounds, or we just put it as required. Since official CodeQL doesn't perfectly support pure Rust natively yet without build tricks, cpp is often used as a fallback if C dependencies exist. We will just configure it.

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Install Linux dependencies
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

    - name: Build
      run: cargo build

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
